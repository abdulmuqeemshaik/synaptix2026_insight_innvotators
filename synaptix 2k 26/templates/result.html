<script>
    const sectionData = JSON.parse('{{ section_data | tojson | safe }}');

    const labels = Object.keys(sectionData);
    const values = Object.values(sectionData);

    new Chart(document.getElementById("barChart"), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Section Percentage',
                data: values
            }]
        }
    });

    new Chart(document.getElementById("pieChart"), {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: values
            }]
        }
    });
</script>
